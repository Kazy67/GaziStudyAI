<p-toast></p-toast>
<div
  class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 transition-colors duration-300 relative px-4"
>
  <!-- Top Right Floating Panel -->
  <div
    class="absolute top-4 right-4 flex items-center gap-3 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-2 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 z-50"
  >
    <app-theme-switcher></app-theme-switcher>
    <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
    <app-language-switcher></app-language-switcher>
  </div>

  <div
    class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 p-8 transition-colors duration-300"
  >
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800 dark:text-white mb-2">
        {{ "LOGIN_TITLE" | translate }}
      </h2>
      <p class="text-gray-500 dark:text-gray-400">
        {{ "LOGIN_SUBTITLE" | translate }}
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-1">
        <div class="flex gap-2">
          <label
            for="email"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >{{ "EMAIL" | translate }}</label
          >
          <i class="pi pi-envelope z-10"></i>
        </div>
        <div class="p-input-icon-left w-full">
          <input
            pInputText
            id="email"
            formControlName="email"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
            [placeholder]="'student@gazi.edu.tr'"
            [ngClass]="{
              'ng-invalid ng-dirty':
                loginForm.get('email')?.touched &&
                loginForm.get('email')?.invalid,
            }"
          />
        </div>
        <small
          *ngIf="
            loginForm.get('email')?.invalid && loginForm.get('email')?.touched
          "
          class="text-red-500 block mt-1"
        >
          <span *ngIf="loginForm.get('email')?.errors?.['required']">{{
            "REQUIRED" | translate
          }}</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">{{
            "VALID_EMAIL" | translate
          }}</span>
        </small>
      </div>

      <div class="space-y-1">
        <div class="flex justify-between items-center">
          <label
            for="password"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >{{ "PASSWORD" | translate }}</label
          >
        </div>
        <!-- Primeng Password with toggleMask -->
        <p-password
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
          [placeholder]="'••••••••'"
        ></p-password>
        <small
          *ngIf="
            loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched
          "
          class="text-red-500 block mt-1"
        >
          <span *ngIf="loginForm.get('password')?.errors?.['required']">{{
            "REQUIRED" | translate
          }}</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">{{
            "MIN_CHARS" | translate
          }}</span>
        </small>
      </div>

      <!-- Remember Me -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <p-checkbox
            formControlName="rememberMe"
            [binary]="true"
            inputId="remember"
          ></p-checkbox>
          <label
            for="remember"
            class="text-sm text-gray-600 dark:text-gray-400 select-none cursor-pointer"
            >{{ "REMEMBER_ME" | translate }}</label
          >
        </div>
        <a
          routerLink="/forgot-password"
          class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium transition-colors"
        >
          {{ "FORGOT_PASSWORD_LINK" | translate }}
        </a>
      </div>

      <button
        pButton
        type="submit"
        [label]="
          isLoading ? ('LOGGING_IN' | translate) : ('LOGIN_BUTTON' | translate)
        "
        [disabled]="loginForm.invalid || isLoading"
        class="w-full justify-center"
        [loading]="isLoading"
      ></button>

      <p class="text-center text-sm text-gray-600 dark:text-gray-400 mt-6">
        {{ "NO_ACCOUNT" | translate }}
        <a
          routerLink="/register"
          class="text-blue-600 dark:text-blue-400 hover:underline font-medium"
          >{{ "CREATE_ACCOUNT" | translate }}</a
        >
      </p>
    </form>
  </div>
</div>
