<p-toast></p-toast>
<div
  class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 transition-colors duration-300 relative px-4"
>
  <!-- Top Right Floating Panel -->
  <div
    class="absolute top-4 right-4 flex items-center gap-3 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-2 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 z-50"
  >
    <app-theme-switcher></app-theme-switcher>
    <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
    <app-language-switcher></app-language-switcher>
  </div>

  <!-- Registration Card -->
  <div
    class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 transition-colors duration-300"
  >
    <!-- Header -->
    <div class="px-8 pt-8 pb-6">
      <h2
        class="text-3xl font-bold text-gray-800 dark:text-white text-center mb-2"
      >
        {{ "WELCOME" | translate }}
      </h2>
      <p class="text-gray-500 dark:text-gray-400 text-center text-sm">
        {{ "CREATE_ACCOUNT_SUBTITLE" | translate }}
      </p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="registerForm"
      (ngSubmit)="onSubmit()"
      class="px-8 pb-8 space-y-5"
    >
      <!-- Name Fields Row -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label
            for="firstName"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >{{ "FIRST_NAME" | translate }}</label
          >
          <input
            type="text"
            id="firstName"
            formControlName="firstName"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
            [class.border-red-500]="isFieldInvalid('firstName')"
            placeholder="John"
          />
          <span
            *ngIf="isFieldInvalid('firstName')"
            class="text-xs text-red-500"
            >{{ "REQUIRED" | translate }}</span
          >
        </div>
        <div class="space-y-1">
          <label
            for="lastName"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >{{ "LAST_NAME" | translate }}</label
          >
          <input
            type="text"
            id="lastName"
            formControlName="lastName"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
            [class.border-red-500]="isFieldInvalid('lastName')"
            placeholder="Doe"
          />
          <span
            *ngIf="isFieldInvalid('lastName')"
            class="text-xs text-red-500"
            >{{ "REQUIRED" | translate }}</span
          >
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-1">
        <label
          for="email"
          class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >{{ "EMAIL" | translate }}</label
        >
        <input
          type="email"
          id="email"
          formControlName="email"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
          [class.border-red-500]="isFieldInvalid('email')"
          placeholder="student@gazi.edu.tr"
        />
        <span *ngIf="isFieldInvalid('email')" class="text-xs text-red-500">{{
          "VALID_EMAIL" | translate
        }}</span>
      </div>

      <!-- Password -->
      <div class="space-y-1">
        <label
          for="password"
          class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >{{ "PASSWORD" | translate }}</label
        >
        <input
          type="password"
          id="password"
          formControlName="password"
          class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
          [class.border-red-500]="isFieldInvalid('password')"
          placeholder="••••••••"
        />
        <span *ngIf="isFieldInvalid('password')" class="text-xs text-red-500">{{
          "MIN_CHARS" | translate
        }}</span>
      </div>

      <!-- Optional Fields Row -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label
            for="studentNumber"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >{{ "STUDENT_NUMBER" | translate }}</label
          >
          <input
            type="text"
            id="studentNumber"
            formControlName="studentNumber"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-400"
            placeholder="123456789"
          />
        </div>
        <div class="space-y-1">
          <label
            for="department"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300"
            >{{ "DEPARTMENT" | translate }}</label
          >
          <select
            id="department"
            formControlName="department"
            class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all appearance-none cursor-pointer"
          >
            <option value="" disabled selected>
              {{ "SELECT_DEPARTMENT" | translate }}
            </option>

            <option *ngFor="let dept of departments" [value]="dept.value">
              {{ "DEPARTMENTS." + dept.value | translate }}
            </option>
          </select>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="registerForm.invalid || isLoading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition-all transform active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center"
      >
        <span *ngIf="!isLoading">{{ "CREATE_ACCOUNT" | translate }}</span>
        <i *ngIf="isLoading" class="pi pi-spinner pi-spin"></i>
      </button>

      <!-- Login Link -->
      <p class="text-center text-sm text-gray-600 dark:text-gray-400">
        {{ "ALREADY_HAVE_ACCOUNT" | translate }}
        <a
          routerLink="/login"
          class="text-blue-600 dark:text-blue-400 hover:underline font-medium"
          >{{ "LOGIN" | translate }}</a
        >
      </p>
    </form>
  </div>
</div>
