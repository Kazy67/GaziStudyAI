<p-toast></p-toast>
<div
  class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 transition-colors duration-300 relative px-4"
>
  <!-- Top Right Floating Panel -->
  <div
    class="absolute top-4 right-4 flex items-center gap-3 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm p-2 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 z-50"
  >
    <app-theme-switcher></app-theme-switcher>
    <div class="h-4 w-px bg-gray-300 dark:bg-gray-600"></div>
    <app-language-switcher></app-language-switcher>
  </div>

  <!-- Verification Card -->
  <div
    class="w-full max-w-md bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 p-8 text-center transition-colors duration-300"
  >
    <div class="mb-6">
      <div
        class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600 dark:text-blue-400"
      >
        <i class="pi pi-envelope text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">
        {{ "VERIFY_EMAIL_TITLE" | translate }}
      </h2>
      <p class="text-gray-500 dark:text-gray-400 text-sm">
        {{ "VERIFY_EMAIL_SUBTITLE" | translate }}
      </p>
    </div>

    <form [formGroup]="verifyForm" (ngSubmit)="onVerify()" class="space-y-6">
      <!-- Email (Disabled) -->
      <div class="text-left">
        <label
          class="block text-xs font-medium text-gray-500 dark:text-gray-400 mb-1 ml-1"
          >{{ "EMAIL" | translate }}</label
        >
        <input
          type="email"
          formControlName="email"
          class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-gray-500 dark:text-gray-400 cursor-not-allowed outline-none select-none"
        />
      </div>

      <!-- OTP Input -->
      <div class="flex justify-center">
        <p-inputOtp
          formControlName="code"
          [length]="6"
          [integerOnly]="true"
        ></p-inputOtp>
      </div>

      <div class="space-y-3">
        <p-button
          type="submit"
          [label]="
            isLoading ? ('VERIFYING' | translate) : ('VERIFY' | translate)
          "
          [loading]="isLoading"
          [disabled]="verifyForm.invalid || isLoading"
          styleClass="w-full"
        ></p-button>

        <button
          type="button"
          (click)="onResendCode()"
          [disabled]="isResending"
          class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-medium transition-colors flex items-center justify-center gap-2 mx-auto disabled:opacity-50"
        >
          <i *ngIf="isResending" class="pi pi-spinner pi-spin"></i>
          {{ "RESEND_CODE" | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
