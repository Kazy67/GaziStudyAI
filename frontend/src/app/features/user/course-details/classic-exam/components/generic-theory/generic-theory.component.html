<div
  class="p-6 bg-white dark:bg-gray-800 rounded-lg shadow-md border border-gray-200 dark:border-gray-700"
>
  <!-- Header -->
  <div class="mb-4">
    <span
      class="inline-block px-2 py-1 text-xs font-bold text-yellow-700 bg-yellow-100 rounded dark:bg-yellow-900 dark:text-yellow-200 uppercase"
    >
      {{ "EXAM.GENERIC_THEORY.TITLE" | translate }}
    </span>
    <h3 class="text-xl font-bold text-gray-800 dark:text-white mt-2">
      {{ question.questionText }}
    </h3>
  </div>

  <!-- Essay Input -->
  <div class="space-y-4">
    <div>
      <label
        class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2"
      >
        {{ "EXAM.GENERIC_THEORY.YOUR_ANSWER" | translate }}
      </label>
      <textarea
        [(ngModel)]="userAnswer"
        [disabled]="isSubmitted"
        rows="5"
        class="w-full p-4 border rounded-lg shadow-sm focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white resize-none"
        placeholder="{{
          'EXAM.GENERIC_THEORY.ENTER_ANSWER_PLACEHOLDER' | translate
        }}"
      ></textarea>
    </div>

    <!-- Results Section -->
    <div *ngIf="isSubmitted" class="animate-fade-in-up space-y-4">
      <!-- Score Bar -->
      <div
        class="flex items-center justify-between bg-gray-100 dark:bg-gray-900 p-4 rounded-lg"
      >
        <span class="font-bold text-gray-700 dark:text-gray-300">{{
          "EXAM.GENERIC_THEORY.SCORE_LABEL" | translate
        }}</span>
        <div class="flex items-center space-x-2">
          <span
            class="text-2xl font-extrabold"
            [ngClass]="{
              'text-green-600': score >= 70,
              'text-yellow-600': score >= 40 && score < 70,
              'text-red-600': score < 40,
            }"
          >
            {{ score }}%
          </span>
        </div>
      </div>

      <!-- Keyword Analysis -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Found Keywords -->
        <div
          class="p-4 bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-800 rounded-lg"
        >
          <h4
            class="text-sm font-bold text-green-800 dark:text-green-300 mb-2 flex items-center"
          >
            <i class="pi pi-check-circle mr-2"></i>
            {{ "EXAM.GENERIC_THEORY.FOUND_KEYWORDS" | translate }}
          </h4>
          <div class="flex flex-wrap gap-2">
            <span
              *ngFor="let kw of foundKeywords"
              class="px-2 py-1 text-xs font-bold bg-green-100 text-green-800 rounded-full dark:bg-green-800 dark:text-green-100"
            >
              {{ kw }}
            </span>
            <span
              *ngIf="foundKeywords.length === 0"
              class="text-sm text-gray-500 italic"
            >
              -
            </span>
          </div>
        </div>

        <!-- Missed Keywords -->
        <div
          class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800 rounded-lg"
        >
          <h4
            class="text-sm font-bold text-red-800 dark:text-red-300 mb-2 flex items-center"
          >
            <i class="pi pi-times-circle mr-2"></i>
            {{ "EXAM.GENERIC_THEORY.MISSED_KEYWORDS" | translate }}
          </h4>
          <div class="flex flex-wrap gap-2">
            <span
              *ngFor="let kw of missedKeywords"
              class="px-2 py-1 text-xs font-bold bg-red-100 text-red-800 rounded-full dark:bg-red-800 dark:text-red-100"
            >
              {{ kw }}
            </span>
            <span
              *ngIf="missedKeywords.length === 0"
              class="text-sm text-gray-500 italic"
            >
              -
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
