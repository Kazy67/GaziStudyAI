<div
  class="p-6 bg-white dark:bg-gray-800 rounded-lg shadow-md border border-gray-200 dark:border-gray-700"
>
  <!-- Header -->
  <div class="mb-4">
    <span
      class="inline-block px-2 py-1 text-xs font-bold text-blue-700 bg-blue-100 rounded dark:bg-blue-900 dark:text-blue-200 uppercase"
    >
      C# Code Completion
    </span>
    <h3 class="text-xl font-bold text-gray-800 dark:text-white mt-2">
      {{ question.questionText }}
    </h3>
  </div>

  <!-- Code Editor Window -->
  <div class="relative rounded-lg overflow-hidden border border-gray-700 bg-[#1e1e1e] shadow-2xl font-mono text-sm md:text-base">
    <!-- Window Controls -->
    <div class="flex items-center space-x-2 px-4 py-2 bg-[#2d2d2d] border-b border-gray-700">
      <div class="w-3 h-3 rounded-full bg-red-500"></div>
      <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
      <div class="w-3 h-3 rounded-full bg-green-500"></div>
      <div class="ml-4 text-gray-400 text-xs">Program.cs</div>
    </div>

    <!-- Code Content -->
    <div class="p-6 text-gray-300 relative">
      <div class="font-mono whitespace-pre-wrap leading-relaxed text-gray-300"><span *ngIf="codeParts[0]">{{ codeParts[0] }}</span><input type="text" [(ngModel)]="userCode" [disabled]="isSubmitted" class="bg-transparent border-b-2 border-gray-500 text-yellow-300 font-bold focus:outline-none focus:border-yellow-400 px-1 py-0 mx-1 min-w-[60px] text-center" [ngClass]="{'border-green-500 text-green-400': isSubmitted && score === 100, 'border-red-500 text-red-400': isSubmitted && score === 0}" placeholder="..." /><span *ngIf="codeParts[1]">{{ codeParts[1] }}</span></div>
    </div>
  </div>

  <!-- Results Section -->
  <div *ngIf="isSubmitted" class="mt-6 animate-fade-in-up">
    <!-- Correct/Incorrect Alert -->
    <div
      class="p-4 rounded-lg flex items-start"
      [ngClass]="{
        'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300': score === 100,
        'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300': score === 0
      }"
    >
      <i
        class="pi mr-3 mt-1 text-xl"
        [ngClass]="{
          'pi-check-circle': score === 100,
          'pi-times-circle': score === 0
        }"
      ></i>
      <div>
        <h4 class="font-bold text-lg mb-1">
          {{
            score === 100
              ? ('EXAM.CORRECT_ANSWER' | translate)
              : ('EXAM.WRONG_ANSWER' | translate)
          }}
        </h4>
        <p *ngIf="score === 0">
          {{ 'EXAM.CORRECT_WAS' | translate }}: 
          <span class="font-mono font-bold bg-black/10 dark:bg-white/10 px-2 py-0.5 rounded">
            {{ question.solutionData.correctCode }}
          </span>
        </p>
      </div>
    </div>
  </div>
</div>
