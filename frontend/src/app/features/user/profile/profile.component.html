<p-toast></p-toast>
<div class="space-y-6 text-slate-800 dark:text-white max-w-2xl mx-auto p-4">
  <!-- Header -->
  <div>
    <h1 class="text-3xl font-bold mb-2">{{ "MY_PROFILE" | translate }}</h1>
    <p class="text-slate-500 dark:text-slate-400">
      {{ "PROFILE_SUBTITLE" | translate }}
    </p>
  </div>

  <!-- Profile Form Card -->
  <div
    class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6 shadow-sm"
  >
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Profile Image Section -->
      <div class="flex flex-col items-center space-y-4 mb-6">
        <div
          class="group/image relative w-32 h-32 rounded-full overflow-hidden border-4 border-slate-200 dark:border-slate-700 shadow-md"
        >
          <img
            [src]="displayImageUrl || 'assets/images/default-avatar.png'"
            alt="Profile Photo"
            class="w-full h-full object-cover transition-transform duration-300 group-hover/image:scale-110"
            (error)="handleImageError($event)"
          />

          <!-- Hover Overlay -->
          <div
            class="absolute inset-0 bg-black/50 opacity-0 group-hover/image:opacity-100 transition-opacity duration-300 flex items-center justify-center gap-4"
          >
            <!-- Upload Button -->
            <label
              for="file-upload"
              class="p-2 bg-white/20 hover:bg-white/40 rounded-full cursor-pointer transition-colors text-white"
              title="{{ 'CHANGE_PHOTO' | translate }}"
            >
              <i class="pi pi-pencil text-lg"></i>
            </label>

            <!-- Remove Button -->
            <button
              type="button"
              (click)="removePhoto()"
              *ngIf="
                displayImageUrl && !displayImageUrl.includes('default-avatar')
              "
              class="p-2 bg-red-500/80 hover:bg-red-600/90 rounded-full cursor-pointer transition-colors text-white"
              title="{{ 'REMOVE_PHOTO' | translate }}"
            >
              <i class="pi pi-trash text-lg"></i>
            </button>
          </div>
        </div>

        <!-- Hidden File Input -->
        <input
          id="file-upload"
          type="file"
          (change)="onFileSelected($event)"
          accept="image/*"
          class="hidden"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- First Name -->
        <div class="space-y-2">
          <label
            for="firstName"
            class="block text-sm font-medium text-slate-700 dark:text-slate-300"
            >{{ "FIRST_NAME" | translate }}</label
          >
          <input
            type="text"
            id="firstName"
            formControlName="firstName"
            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-500]="isFieldInvalid('firstName')"
            placeholder="John"
          />
          <div
            *ngIf="isFieldInvalid('firstName')"
            class="text-red-500 text-xs mt-1"
          >
            {{ "REQUIRED" | translate }}
          </div>
        </div>

        <!-- Last Name -->
        <div class="space-y-2">
          <label
            for="lastName"
            class="block text-sm font-medium text-slate-700 dark:text-slate-300"
            >{{ "LAST_NAME" | translate }}</label
          >
          <input
            type="text"
            id="lastName"
            formControlName="lastName"
            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            [class.border-red-500]="isFieldInvalid('lastName')"
            placeholder="Doe"
          />
          <div
            *ngIf="isFieldInvalid('lastName')"
            class="text-red-500 text-xs mt-1"
          >
            {{ "REQUIRED" | translate }}
          </div>
        </div>
      </div>

      <!-- Email (Read Only) -->
      <div class="space-y-2">
        <label
          for="email"
          class="block text-sm font-medium text-slate-700 dark:text-slate-300"
          >{{ "EMAIL" | translate }}</label
        >
        <input
          type="email"
          id="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 cursor-not-allowed"
          readonly
        />
        <p class="text-xs text-slate-500">
          {{ "EMAIL_CANNOT_BE_CHANGED" | translate }}
        </p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Student Number -->
        <div class="space-y-2">
          <label
            for="studentNumber"
            class="block text-sm font-medium text-slate-700 dark:text-slate-300"
            >{{ "STUDENT_NUMBER" | translate }}</label
          >
          <input
            type="text"
            id="studentNumber"
            formControlName="studentNumber"
            class="w-full px-4 py-2 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
            placeholder="123456789"
          />
        </div>

        <!-- Department -->
        <div class="space-y-2">
          <label
            for="department"
            class="block text-sm font-medium text-slate-700 dark:text-slate-300"
            >{{ "DEPARTMENT" | translate }}</label
          >
          <div class="relative">
            <select
              id="department"
              formControlName="department"
              class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all appearance-none cursor-pointer"
            >
              <option value="" disabled selected>
                {{ "SELECT_DEPARTMENT" | translate }}
              </option>
              <option *ngFor="let dept of departments" [value]="dept.value">
                {{ dept.label | translate }}
              </option>
            </select>
            <div
              class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-slate-500 dark:text-slate-400"
            >
              <i class="pi pi-chevron-down text-sm"></i>
            </div>
          </div>
        </div>
      </div>

      <div class="pt-4 flex justify-end">
        <button
          type="submit"
          [disabled]="isLoading"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
        >
          <span
            *ngIf="isLoading"
            class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"
          ></span>
          {{
            isLoading ? ("SAVING" | translate) : ("SAVE_CHANGES" | translate)
          }}
        </button>
      </div>
    </form>
  </div>
</div>
