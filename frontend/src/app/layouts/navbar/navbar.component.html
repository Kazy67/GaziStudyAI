<header
  [class.lg:left-64]="layoutService.isSidebarOpen()"
  class="fixed top-0 right-0 left-0 h-16 bg-white/90 dark:bg-slate-900/95 backdrop-blur-sm border-b border-slate-200 dark:border-slate-800 z-50 flex items-center justify-between px-6 transition-[left] duration-300"
>
  <!-- Left Side: Menu Toggler + Logo -->
  <div class="flex items-center gap-4">
    <button
      (click)="layoutService.toggleSidebar()"
      class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
    >
      <i class="pi pi-bars text-xl"></i>
    </button>
    <div
      class="flex items-center gap-2 lg:hidden cursor-pointer"
      routerLink="/home"
    >
      <i class="pi pi-graduation-cap text-xl text-blue-500"></i>
      <span
        class="text-lg font-bold bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent"
        >GaziStudyAI</span
      >
    </div>
  </div>

  <!-- Spacer -->
  <div class="hidden lg:block"></div>

  <!-- Right Side Actions -->
  <div class="flex items-center gap-4">
    <!-- Theme Switcher -->
    <app-theme-switcher></app-theme-switcher>

    <!-- Language Selector -->
    <app-language-switcher></app-language-switcher>

    <!-- User Profile Dropdown -->
    <div class="relative ml-2" *ngIf="user">
      <button
        (click)="toggleUserMenu()"
        class="flex items-center gap-3 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full py-1 pr-3 pl-1 transition-colors border border-transparent hover:border-slate-200 dark:hover:border-slate-700"
      >
        <img
          [src]="displayImageUrl || initialsAvatarUrl"
          alt="User Avatar"
          class="w-8 h-8 rounded-full border border-slate-300 dark:border-slate-600 object-cover"
          (error)="handleImageError($event)"
        />
        <span
          class="hidden md:block text-sm font-medium text-slate-700 dark:text-slate-300"
          >{{ user.firstName }} {{ user.lastName }}</span
        >
        <i class="pi pi-angle-down text-xs text-slate-500 md:block hidden"></i>
      </button>

      <!-- Dropdown Menu -->
      <div
        *ngIf="isUserMenuOpen"
        class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-lg shadow-lg border border-slate-200 dark:border-slate-700 py-1 origin-top-right transform transition-all"
      >
        <a
          href="/profile"
          class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white"
          >Profile</a
        >
        <a
          href="#"
          class="block px-4 py-2 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white"
          >Settings</a
        >
        <div class="border-t border-slate-200 dark:border-slate-700 my-1"></div>
        <a
          href="#"
          class="block px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-red-700 dark:hover:text-red-300"
          >Sign out</a
        >
      </div>
    </div>
  </div>
</header>
