<aside
  [class.translate-x-0]="layoutService.isSidebarOpen()"
  [class.-translate-x-full]="!layoutService.isSidebarOpen()"
  class="fixed left-0 top-0 h-full w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 flex flex-col z-20 transition-transform duration-300"
>
  <!-- Brand Logo Area (Matches Header Height) -->
  <div
    class="h-16 flex items-center px-6 border-b border-slate-200 dark:border-slate-800"
  >
    <div class="flex items-center gap-3 cursor-pointer" routerLink="/home">
      <i class="pi pi-graduation-cap text-2xl text-blue-500"></i>
      <span
        class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent"
        >GaziStudyAI</span
      >
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.route"
      routerLinkActive="bg-blue-50 dark:bg-blue-600/10 text-blue-600 dark:text-blue-400 border-r-2 border-blue-500"
      class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group relative cursor-pointer text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100"
    >
      <i
        [class]="
          item.icon +
          ' text-lg transition-colors group-hover:text-blue-500 dark:group-hover:text-blue-400'
        "
      ></i>
      <span class="font-medium text-sm">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Bottom Actions -->
  <div class="p-4 border-t border-slate-200 dark:border-slate-800">
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-red-50 hover:text-red-500 dark:hover:bg-red-500/10 dark:hover:text-red-400 transition-colors"
    >
      <i class="pi pi-sign-out text-lg"></i>
      <span class="font-medium text-sm">Log Out</span>
    </button>
  </div>
</aside>
